<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    h3 { margin: 0 0 12px; font-size: 16px; }
    .section {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .section-title {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .status { color: #666; margin-bottom: 8px; font-size: 13px; }
    .result {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #0369a1;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    .captcha-img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 6px;
      box-sizing: border-box;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #0284c7;
      box-shadow: 0 0 0 2px rgba(2,132,199,0.15);
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #374151;
    }
    .checkbox-row input[type="checkbox"] { margin: 0; }
    button {
      width: 100%;
      padding: 9px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 4px;
    }
    button:hover { background: #0369a1; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    button.secondary { background: #64748b; }
    button.secondary:hover { background: #475569; }
    button.success { background: #059669; }
    button.success:hover { background: #047857; }
    button.outline {
      background: transparent;
      color: #6b7280;
      border: 1px solid #d1d5db;
    }
    button.outline:hover { background: #f3f4f6; color: #374151; }
    .error { color: #dc2626; margin-top: 6px; font-size: 12px; }
    .saved { color: #059669; font-size: 12px; margin-top: 2px; }
    .page { display: none; }
    .page.active { display: block; }
    .nav-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    .nav-row a {
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
      text-decoration: none;
    }
    .nav-row a:hover { color: #0284c7; }
  </style>
</head>
<body>
  <!-- 主页 -->
  <div id="mainPage" class="page active">
    <h3>NJU 自动登录</h3>
    <div class="nav-row"><a id="openSettings">设置</a></div>
    <input type="text" id="username" placeholder="用户名 / 学号" />
    <input type="password" id="password" placeholder="密码" />
    <div class="checkbox-row">
      <input type="checkbox" id="autoLogin" />
      <label for="autoLogin">页面加载时自动登录</label>
    </div>
    <div class="status" id="status">在南大认证页面点击一键登录</div>
    <button id="loginBtn" class="success">一键登录</button>
    <div class="error" id="error"></div>
  </div>

  <!-- 设置页 -->
  <div id="settingsPage" class="page">
    <h3>设置</h3>
    <div class="nav-row"><a id="backMain">返回</a></div>

    <div class="section">
      <div class="section-title">测试识别</div>
      <div class="status" id="testStatus">测试当前页面验证码识别效果</div>
      <img class="captcha-img" id="captchaImg" style="display:none" />
      <div class="result" id="testResult">--</div>
      <button id="testBtn" class="outline">测试识别</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
